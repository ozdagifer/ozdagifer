name: Refresh GIF snapshot

on:
  schedule:
    - cron: "0 3 * * *" # every day at 03:00 UTC
  workflow_dispatch:

jobs:
  update-gifs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Fetch latest GIFs from GIPHY channel
        run: npm run fetch

      - name: Commit updated gifs.json
        run: |
          if git diff --quiet data/gifs.json; then
            echo "No changes in data/gifs.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gifs.json
          git commit -m "chore: refresh GIF snapshot"
          git push

